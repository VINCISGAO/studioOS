name: Production Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: Static gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate
        run: bash scripts/prisma-with-env.sh validate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Deposit security (static)
        run: npm run deposit:security:verify

  integration:
    name: Database integration
    needs: static
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
      AUTH_SECURITY_SECRET: ${{ secrets.AUTH_SECURITY_SECRET }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Require DATABASE_URL secret
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::error title=Missing GitHub secret::Configure repository secret DATABASE_URL (Neon connection string) to run deposit reconcile and production DB gates."
            echo "Path: GitHub repo → Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi

      - name: Production DB gates
        run: npm run production:verify -- --integration-only
