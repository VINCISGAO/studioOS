# StudioOS local development — Vol 16 Bootstrap
# Usage: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: studioos-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: studioos
      POSTGRES_PASSWORD: studioos
      POSTGRES_DB: studioos
    volumes:
      - studioos_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studioos -d studioos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: studioos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - studioos_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: studioos-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: studioos
      MINIO_ROOT_PASSWORD: studioosdev
    command: server /data --console-address ":9001"
    volumes:
      - studioos_minio_data:/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: studioos-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  studioos_pg_data:
  studioos_redis_data:
  studioos_minio_data:
